events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    server {
        listen 80;
        server_name cnpi.bf;

        root /var/www/public;
        index index.php index.html index.htm;

        # Protection contre certains scanners/robots malveillants
        if ($http_user_agent ~* (sqlmap|nikto|python|java|morfeus|scanbot)) {
            return 403;
        }

        # Route principale Laravel
        location / {
            try_files $uri $uri/ /index.php?$query_string;
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        # Cache pour assets statiques
        location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;       # Container PHP-FPM ou service
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # Sécurité reverse proxy / HTTPS forwarding
            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
            fastcgi_param HTTP_X_FORWARDED_PORT 443;
            fastcgi_param HTTP_X_FORWARDED_HOST $host;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

            fastcgi_hide_header X-Powered-By;

            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        # Refuser l'accès aux fichiers sensibles
        location ~ /\.(ht|env|git|svn) {
            deny all;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(log|sqlite)$ {
            deny all;
        }

        # Favicon et robots.txt silencieux
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        location = /robots.txt {
            log_not_found off;
            access_log off;
        }

        # Désactiver la version nginx
        server_tokens off;
    }
}