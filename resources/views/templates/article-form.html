<!--
  Formulaire de gestion d'un article (back-office)
  En-tête : bouton retour + titre. Formulaire : 2 lignes × 2 colonnes.
  Bootstrap CSS + Bootstrap Icons + bundle JS officiel (menu responsive).
-->

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouvel article | Administration SP-CNPI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container py-5">

  <!-- En-tête (retour + titre) -->
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="articles.html"
       class="btn btn-link text-body icon-circle-xs text-decoration-none hover-bg-secondary-25 p-0 m-0">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="h5 mb-0 fw-semibold">
      Nouvel article
      <small class="text-body-secondary fw-normal fs-6">#nouveau</small>
    </h1>
  </div>

  <!-- Formulaire : 2 lignes × 2 colonnes -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form>
        <div class="row g-4">
          <!-- Ligne 1 -->
          <div class="col-md-6">
            <label for="titre" class="form-label fw-semibold">Titre de l'article</label>
            <input type="text" id="titre" class="form-control" placeholder="Ex. Guide complet pour déposer un brevet">
          </div>
          <div class="col-md-6">
            <label for="categorie" class="form-label fw-semibold">Catégorie</label>
            <select id="categorie" class="form-select">
              <option selected disabled value="">Choisir une catégorie</option>
              <option>Brevets</option>
              <option>Marques</option>
              <option>Dessins et modèles</option>
              <option>Droit d'auteur</option>
              <option>Actualités</option>
            </select>
          </div>
          <!-- Ligne 2 -->
          <div class="col-md-6">
            <label for="auteur" class="form-label fw-semibold">Auteur</label>
            <input type="text" id="auteur" class="form-control" placeholder="Nom de l'auteur">
          </div>
          <div class="col-md-6">
            <label for="date" class="form-label fw-semibold">Date de publication</label>
            <input type="date" id="date" class="form-control">
          </div>
          <!-- Image à la une -->
          <div class="col-12">
            <label for="image" class="form-label fw-semibold">Image à la une</label>
            <input type="file" id="image" class="form-control" accept="image/*">
            <div class="form-text">Formats acceptés : JPG, PNG. Taille recommandée : 1200×630 px.</div>
          </div>
          <!-- Galerie d'images -->
          <div class="col-12">
            <label for="galerie" class="form-label fw-semibold">Galerie d'images</label>
            <input type="file" id="galerie" class="form-control" accept="image/*" multiple>
            <div class="form-text">Vous pouvez sélectionner plusieurs images à afficher dans l'article.</div>
            <div id="galerie-preview" class="d-flex flex-wrap gap-2 mt-3"></div>
          </div>
          <!-- Résumé / Extrait -->
          <div class="col-12">
            <label for="resume" class="form-label fw-semibold">Résumé (aperçu)</label>
            <textarea id="resume" class="form-control" rows="3" maxlength="160" placeholder="Court extrait affiché sur les cartes d'articles..."></textarea>
            <div class="form-text">Aperçu affiché dans la liste des actualités (160 caractères max).</div>
          </div>
          <!-- Contenu -->
          <div class="col-12">
            <label for="contenu" class="form-label fw-semibold">Contenu</label>
            <textarea id="contenu" class="form-control" rows="10" placeholder="Rédigez le contenu de l'article..."></textarea>
          </div>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="articles.html" class="btn btn-outline-secondary px-4">Annuler</a>
          <button type="submit" class="btn btn-primary px-4">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

</main>

<!-- Bundle JS officiel de Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Aperçu des miniatures de la galerie -->
<script>
  const galerieInput = document.getElementById('galerie');
  const galeriePreview = document.getElementById('galerie-preview');

  galerieInput.addEventListener('change', () => {
    galeriePreview.innerHTML = '';
    Array.from(galerieInput.files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const url = URL.createObjectURL(file);
      const img = document.createElement('img');
      img.src = url;
      img.alt = file.name;
      img.className = 'rounded border';
      img.style.width = '96px';
      img.style.height = '96px';
      img.style.objectFit = 'cover';
      img.onload = () => URL.revokeObjectURL(url);
      galeriePreview.appendChild(img);
    });
  });
</script>
</body>
</html>
